name: SDK

# Verify the committed SDK matches the vendored OpenAPI spec on every PR, and
# publish to npm when a version tag is pushed.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Regenerate from the vendored spec and fail if the result differs from what is
  # committed. This keeps src/ honest: a spec bump that wasn't regenerated, or a
  # hand-edit of generated code, both break the build.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # OpenAPI Generator runs on the JVM; the npm wrapper downloads the JAR.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: npm ci

      - name: Regenerate SDK from spec
        run: npm run generate

      - name: Fail if the committed SDK is out of date
        run: |
          if ! git diff --quiet -- src; then
            echo "::error::Generated SDK is out of date with openapi/trile.json."
            echo "Run 'npm run generate' locally and commit the result."
            git diff --stat -- src
            exit 1
          fi
          echo "✓ Committed SDK matches the spec."

      - name: Type-check
        run: npm run build

  # Publish to npm on a version tag (e.g. v0.1.0). Requires repo secret NPM_TOKEN.
  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Guard tag against package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG."
            exit 1
          fi

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
